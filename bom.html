<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM Competition - WA Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0f1419;
            --bg-card: #151b26;
            --bg-card-hover: #1a2332;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --sidebar-width: 240px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR - Exact match */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-green);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--accent-green);
        }

        .sidebar-stats {
            padding: 0 20px;
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .nav-menu {
            list-style: none;
            padding: 0 10px;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .nav-link:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--accent-green);
            color: white;
        }

        .nav-link.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-icon {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            font-size: 32px;
            opacity: 0.5;
        }

        /* CHART CARDS */
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .chart-header {
            margin-bottom: 24px;
        }

        .chart-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chart-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* LEADERBOARD */
        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .leaderboard-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-green);
        }

        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #f0ad4e); color: #000; }
        .rank-other { background: var(--bg-card); color: var(--text-secondary); }

        .batch-info {
            flex: 1;
        }

        .batch-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .batch-members {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .batch-score {
            text-align: right;
        }

        .score-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .score-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* PROGRESS BAR */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            transition: width 0.5s ease;
        }

        /* RULES CARD */
        .rules-list {
            list-style: none;
        }

        .rules-list li {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg-secondary);
            border-left: 3px solid var(--accent-green);
            border-radius: 6px;
            font-size: 14px;
        }

        .rules-list li::before {
            content: "✓ ";
            color: var(--accent-green);
            font-weight: bold;
            margin-right: 8px;
        }

        /* SPECIAL SQUAD */
        .squad-card {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            color: white;
        }

        .squad-card .stat-label,
        .squad-card .batch-members {
            color: rgba(255, 255, 255, 0.8);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 24px;
        }

        .btn-primary {
            display: inline-block;
            padding: 12px 24px;
            background: var(--accent-green);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .main-content {
                margin-left: 60px;
                padding: 20px;
            }
            .logo-text, .sidebar-stats, .nav-link span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">💬</div>
                <div class="logo-text">WA <span>Analyzer</span></div>
            </div>
            <div class="sidebar-stats" id="sidebarStats">Loading...</div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="main.html" class="nav-link">
                            <span class="nav-icon">📊</span>
                            <span>Overview</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="main.html#leaderboard" class="nav-link">
                            <span class="nav-icon">🏆</span>
                            <span>Leaderboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link active">
                            <span class="nav-icon">🔥</span>
                            <span>BOM Competition</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" id="mainContent">
            <!-- Content will be injected here -->
        </main>
    </div>

    <script>
        // ===========================
        // DATA LOADING & VALIDATION
        // ===========================
        
        let rawData = [];
        let validMessages = [];
        let batches = {};
        let bomResults = {};
        let todayResults = {};

        // Load data from localStorage
        function loadData() {
            try {
                const stored = localStorage.getItem('wa_data');
                if (!stored) return false;
                rawData = JSON.parse(stored);
                return rawData.length > 0;
            } catch (e) {
                console.error('Data loading error:', e);
                return false;
            }
        }

        // ===========================
        // MESSAGE VALIDATION
        // ===========================
        
        const SPAM_PHRASES = [
            'good morning', 'good night', 'gm', 'gn',
            'hi', 'hello', 'hey', 'ok', 'okay', 'yes', 'no',
            'thanks', 'thank you', 'welcome', 'bye'
        ];

        function isValidMessage(msg) {
            // System messages check
            if (!msg.sender || msg.sender.includes('Messages and calls')) return false;
            
            // Date validation - only April 1 onwards
            if (!msg.dateStr) return false;
            const msgDate = new Date(msg.dateStr);
            const cutoffDate = new Date('2026-04-01');
            if (msgDate < cutoffDate) return false;

            // Time validation - 6 AM to 10 PM
            if (msg.hour < 6 || msg.hour >= 22) return false;

            // Content validation
            if (!msg.content || msg.content.length <= 3) return false;

            // Spam check
            const lowerContent = msg.content.toLowerCase().trim();
            if (SPAM_PHRASES.some(phrase => lowerContent === phrase)) return false;

            return true;
        }

        // ===========================
        // BATCH DETECTION
        // ===========================
        
        function detectBatches(messages) {
            const batchMap = {};
            const userSet = new Set();

            // Extract unique users
            messages.forEach(msg => {
                if (msg.sender) userSet.add(msg.sender);
            });

            // Group by batch year
            userSet.forEach(user => {
                // Extract year using regex - looking for 20XX pattern
                const yearMatch = user.match(/\b(20\d{2})\b/);
                if (yearMatch) {
                    const year = yearMatch[1];
                    if (!batchMap[year]) batchMap[year] = [];
                    // Max 3 users per batch
                    if (batchMap[year].length < 3) {
                        batchMap[year].push(user);
                    }
                }
            });

            return batchMap;
        }

        // ===========================
        // SCORING SYSTEM
        // ===========================
        
        function calculateBOMScores() {
            const scores = {};
            const dailyActivity = {};

            // Initialize scores
            Object.keys(batches).forEach(year => {
                if (year === '2025') return; // Skip BOM Squad
                scores[year] = {
                    batch: year,
                    members: batches[year],
                    totalMessages: 0,
                    activeDays: new Set(),
                    score: 0
                };
            });

            // Count messages and active days
            validMessages.forEach(msg => {
                const yearMatch = msg.sender.match(/\b(20\d{2})\b/);
                if (!yearMatch) return;
                
                const year = yearMatch[1];
                if (!scores[year]) return;

                scores[year].totalMessages++;
                scores[year].activeDays.add(msg.dateStr);
            });

            // Calculate final scores
            Object.keys(scores).forEach(year => {
                const data = scores[year];
                const activeDaysCount = data.activeDays.size;
                
                // Base score: total messages
                let score = data.totalMessages;

                // Consistency bonus
                if (activeDaysCount > 20) {
                    score += 50;
                } else if (activeDaysCount > 10) {
                    score += 20;
                }

                data.score = score;
                data.activeDaysCount = activeDaysCount;
            });

            return scores;
        }

        // ===========================
        // TODAY'S LEADERBOARD
        // ===========================
        
        function calculateTodayScores() {
            const today = new Date().toLocaleDateString('en-GB');
            const scores = {};

            // Initialize
            Object.keys(batches).forEach(year => {
                if (year === '2025') return;
                scores[year] = {
                    batch: year,
                    messages: 0
                };
            });

            // Count today's messages only
            validMessages.forEach(msg => {
                if (msg.dateStr !== today) return;
                
                const yearMatch = msg.sender.match(/\b(20\d{2})\b/);
                if (!yearMatch) return;
                
                const year = yearMatch[1];
                if (scores[year]) {
                    scores[year].messages++;
                }
            });

            return scores;
        }

        // ===========================
        // RENDER FUNCTIONS
        // ===========================
        
        function renderEmptyState() {
            document.getElementById('mainContent').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <div class="empty-state-title">No Data Available</div>
                    <div class="empty-state-text">Please upload a WhatsApp chat file in the main app first</div>
                    <a href="main.html" class="btn-primary">Go to Main App</a>
                </div>
            `;
        }

        function renderDashboard() {
            const sortedBatches = Object.values(bomResults)
                .sort((a, b) => b.score - a.score);

            const topBatch = sortedBatches[0];
            const todaySorted = Object.values(todayResults)
                .sort((a, b) => b.messages - a.messages);
            const todayWinner = todaySorted[0];

            const maxScore = topBatch ? topBatch.score : 1;

            // Get BOM Squad data
            const bomSquad = batches['2025'] || [];

            const html = `
                <div class="page-header">
                    <h1 class="page-title">🔥 Batch Of Month</h1>
                    <p class="page-subtitle">Batch vs Batch Competition • Live Rankings</p>
                </div>

                <!-- STATS GRID -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Batches</div>
                        <div class="stat-value">
                            ${Object.keys(bomResults).length}
                            <span class="stat-icon">🎓</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Valid Messages</div>
                        <div class="stat-value">
                            ${validMessages.length.toLocaleString()}
                            <span class="stat-icon">💬</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Today's Leader</div>
                        <div class="stat-value">
                            Batch ${todayWinner ? todayWinner.batch : '-'}
                            <span class="stat-icon">⚡</span>
                        </div>
                    </div>
                </div>

                <!-- BOM SQUAD -->
                ${bomSquad.length > 0 ? `
                <div class="chart-card squad-card">
                    <div class="chart-header">
                        <div class="chart-title">👑 BOM Squad (Judges)</div>
                        <div class="chart-subtitle">${bomSquad.join(' • ')}</div>
                    </div>
                </div>
                ` : ''}

                <!-- MAIN LEADERBOARD -->
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">🏆 BOM Leaderboard</div>
                        <div class="chart-subtitle">All-time Rankings • April 1 onwards</div>
                    </div>
                    ${sortedBatches.map((batch, index) => {
                        const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : 'rank-other';
                        const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index + 1;
                        const percentage = (batch.score / maxScore) * 100;

                        return `
                            <div class="leaderboard-item">
                                <div class="rank-badge ${rankClass}">${medal}</div>
                                <div class="batch-info">
                                    <div class="batch-name">Batch ${batch.batch}</div>
                                    <div class="batch-members">${batch.members.join(' • ')}</div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${percentage}%"></div>
                                    </div>
                                </div>
                                <div class="batch-score">
                                    <div class="score-value">${batch.score}</div>
                                    <div class="score-label">points</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>

                <!-- TODAY'S LEADERBOARD -->
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">📅 Today's Performance</div>
                        <div class="chart-subtitle">${new Date().toLocaleDateString('en-GB')}</div>
                    </div>
                    ${todaySorted.filter(b => b.messages > 0).map((batch, index) => {
                        const maxToday = todayWinner.messages || 1;
                        const percentage = (batch.messages / maxToday) * 100;

                        return `
                            <div class="leaderboard-item">
                                <div class="rank-badge rank-other">${index + 1}</div>
                                <div class="batch-info">
                                    <div class="batch-name">Batch ${batch.batch}</div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${percentage}%"></div>
                                    </div>
                                </div>
                                <div class="batch-score">
                                    <div class="score-value">${batch.messages}</div>
                                    <div class="score-label">messages</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                    ${todaySorted.every(b => b.messages === 0) ? '<p style="text-align:center; color: var(--text-secondary); padding: 20px;">No activity today yet</p>' : ''}
                </div>

                <!-- RULES -->
                <div class="chart-card">
                    <div class="chart-header">
                        <div class="chart-title">📋 Competition Rules</div>
                        <div class="chart-subtitle">How scoring works</div>
                    </div>
                    <ul class="rules-list">
                        <li>Valid time: 6 AM - 10 PM</li>
                        <li>Minimum message length: 3 characters</li>
                        <li>Spam messages are ignored (hi, hello, ok, etc.)</li>
                        <li>Messages from April 1 onwards count</li>
                        <li>Consistency bonus: +50 for >20 days, +20 for >10 days</li>
                        <li>Max 3 members per batch</li>
                        <li>Batch 2025 is BOM Squad (Judges only)</li>
                    </ul>
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
        }

        // ===========================
        // INITIALIZE APP
        // ===========================
        
        function init() {
            // Load data
            if (!loadData()) {
                renderEmptyState();
                document.getElementById('sidebarStats').textContent = 'No data loaded';
                return;
            }

            // PERFORMANCE: Filter valid messages ONCE
            console.time('Filter Valid Messages');
            validMessages = rawData.filter(isValidMessage);
            console.timeEnd('Filter Valid Messages');

            // Update sidebar stats
            document.getElementById('sidebarStats').textContent = 
                `${validMessages.length} valid messages`;

            // Detect batches
            console.time('Detect Batches');
            batches = detectBatches(validMessages);
            console.timeEnd('Detect Batches');

            // Calculate scores
            console.time('Calculate BOM Scores');
            bomResults = calculateBOMScores();
            console.timeEnd('Calculate BOM Scores');

            console.time('Calculate Today Scores');
            todayResults = calculateTodayScores();
            console.timeEnd('Calculate Today Scores');

            // Render
            console.time('Render Dashboard');
            renderDashboard();
            console.timeEnd('Render Dashboard');

            console.log('BOM Dashboard loaded successfully');
            console.log('Batches:', batches);
            console.log('Results:', bomResults);
        }

        // Run on page load
        init();
    </script>
</body>
</html>
