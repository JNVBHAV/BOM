<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Group Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#07101e;--bg1:#0d1929;--bg2:#132436;--bg3:#1c3352;
  --border:#1e3a5f;--border-hover:#2a5a8a;
  --accent:#25D366;--accent-dim:rgba(37,211,102,0.12);--accent-mid:rgba(37,211,102,0.25);
  --text:#d8edf5;--text-sub:#6b90aa;--text-dim:#3a607a;
  --gold:#f5c542;--silver:#a8b8c4;--bronze:#c97c3a;
  --red:#ef4444;--purple:rgba(167,139,250,0.25);--cyan:rgba(0,229,255,0.2);--amber:rgba(255,179,71,0.2);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.5}
button{font-family:inherit}
input{font-family:inherit}
canvas{display:block}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* Upload Screen */
.upload-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 30% 20%,rgba(37,211,102,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,100,200,0.06) 0%,transparent 50%),var(--bg0)}
.upload-logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:14px}
.upload-logo-icon{width:46px;height:46px;background:var(--accent-dim);border:1px solid rgba(37,211,102,0.3);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px}
.upload-logo-text{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-0.5px}
.upload-logo-text span{color:var(--accent)}
.upload-tagline{color:var(--text-sub);font-size:15px;max-width:420px;margin:0 auto 48px;text-align:center;line-height:1.6}
.drop-zone{width:100%;max-width:540px;border:2px dashed var(--border);border-radius:22px;padding:52px 36px;text-align:center;cursor:pointer;transition:all 0.25s;background:var(--bg1);position:relative}
.drop-zone.drag-over{border-color:var(--accent);background:rgba(37,211,102,0.04)}
.drop-zone-icon{font-size:52px;margin-bottom:18px;display:block}
.drop-zone-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px}
.drop-zone-sub{color:var(--text-sub);font-size:14px;margin-bottom:26px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--accent);color:#000;border-radius:11px;font-weight:800;cursor:pointer;font-size:14px;border:none;transition:all 0.15s}
.btn-primary:hover{background:#1db855;transform:translateY(-1px)}
.upload-progress{margin-top:20px;color:var(--accent);font-size:14px;font-weight:600;min-height:22px}
.upload-error{margin-top:10px;color:var(--red);font-size:13px;min-height:18px}
.feature-pills{margin-top:36px;display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.feature-pill{color:var(--text-sub);font-size:13px;display:flex;align-items:center;gap:6px;background:var(--bg1);border:1px solid var(--border);padding:6px 14px;border-radius:20px}

/* Dashboard Layout */
.dashboard{display:flex;min-height:100vh}
.sidebar{width:238px;min-height:100vh;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform 0.25s}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo-row{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.sidebar-logo-icon{width:30px;height:30px;background:var(--accent-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.sidebar-logo-name{font-weight:900;font-size:15px;color:var(--text)}
.sidebar-logo-name span{color:var(--accent)}
.sidebar-meta{font-size:11px;color:var(--text-dim);padding-left:39px;font-weight:600}
.sidebar-nav{padding:10px 10px;flex:1}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;cursor:pointer;text-align:left;font-size:13.5px;font-weight:600;transition:all 0.15s;margin-bottom:3px;background:transparent;color:var(--text-sub)}
.nav-btn:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-btn.active{background:var(--accent-dim);color:var(--accent)}
.nav-btn-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;font-size:9px;padding:2px 6px;background:var(--accent);color:#000;border-radius:4px;font-weight:800}
.nav-badge-fire{margin-left:auto;font-size:9px;padding:2px 6px;background:linear-gradient(135deg,#ff6b35,#f7c59f);color:#000;border-radius:4px;font-weight:800}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border)}
.btn-secondary{width:100%;padding:9px 14px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s}
.btn-export{background:var(--accent-dim);border:1px solid rgba(37,211,102,0.3);color:var(--accent);margin-bottom:8px}
.btn-export:hover{background:var(--accent-mid)}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--text-sub)}
.btn-reset:hover{background:rgba(255,255,255,0.04)}
.main-content{flex:1;overflow-y:auto;min-width:0}
.page{padding:28px 32px;max-width:1200px}
.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-0.3px;margin-bottom:4px}
.page-sub{color:var(--text-sub);font-size:14px}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:26px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color 0.15s}
.stat-card:hover{border-color:var(--border-hover)}
.stat-glow{position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;filter:blur(18px);pointer-events:none}
.stat-label{font-size:11px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px}
.stat-value{font-size:26px;font-weight:900;color:var(--text);line-height:1;margin-bottom:2px}
.stat-icon{position:absolute;bottom:14px;right:14px;font-size:20px;opacity:0.4}

/* Charts */
.chart-card{background:var(--bg1);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.chart-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:12px;color:var(--text-sub);margin-bottom:16px}
.chart-wrap{position:relative}

/* Top 3 */
.top3-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:12px;margin-bottom:26px}
.top3-card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px}
.top3-card:hover{border-color:var(--accent);background:var(--bg2)}
.top3-medal{font-size:28px;flex-shrink:0}
.top3-info{min-width:0}
.top3-name{font-weight:800;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.top3-count{font-size:24px;font-weight:900;line-height:1}
.top3-meta{font-size:11px;color:var(--text-sub);margin-top:2px}

/* Leaderboard */
.lb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.search-input{padding:9px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;width:220px;transition:border-color 0.15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-dim)}
.lb-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--bg1);border:1px solid var(--border);border-radius:13px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.lb-item:hover{border-color:var(--accent);background:var(--bg2)}
.lb-rank{min-width:38px;text-align:center;font-weight:800;color:var(--text-sub)}
.lb-bar-wrap{flex:1;min-width:0}
.lb-name-row{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.lb-name{font-weight:800;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-share{font-size:12px;color:var(--text-sub)}
.lb-bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.lb-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.5s}
.lb-count{text-align:right;flex-shrink:0}
.lb-count-num{font-size:18px;font-weight:900;color:var(--text)}
.lb-count-sub{font-size:11px;color:var(--text-sub)}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}

/* User Dashboard */
.user-header{display:flex;align-items:center;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.btn-back{padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text-sub);cursor:pointer;font-size:13px;font-weight:700;transition:all 0.15s}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.user-name-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:2px;letter-spacing:-0.3px}
.user-rank-sub{color:var(--text-sub);font-size:13px}
.words-wrap{display:flex;flex-wrap:wrap;gap:8px}
.word-pill{padding:5px 11px;background:var(--accent-dim);border:1px solid rgba(37,211,102,0.25);border-radius:20px;font-size:13px;color:var(--accent);font-weight:700;cursor:pointer;transition:all 0.15s;user-select:none}
.word-pill:hover{background:var(--accent-mid);border-color:rgba(37,211,102,0.5);transform:translateY(-1px)}
.word-pill span{opacity:0.55;font-size:11px;font-weight:500}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.first-last-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fl-card{background:var(--bg1);border:1px solid var(--border);border-radius:13px;padding:16px}
.fl-label{font-size:11px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:8px}
.fl-date{font-size:18px;font-weight:900;color:var(--accent)}

/* ═══════════════════════════════════════════
   NEW: Chat Preview Styles
═══════════════════════════════════════════ */
.chat-page{padding:0;max-width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.chat-topbar{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg1);display:flex;align-items:center;gap:14px;flex-shrink:0}
.chat-topbar-info{flex:1;min-width:0}
.chat-topbar-title{font-size:16px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.chat-keyword-badge{padding:3px 10px;background:rgba(37,211,102,0.15);border:1px solid rgba(37,211,102,0.35);border-radius:12px;font-size:12px;color:var(--accent);font-weight:800;letter-spacing:0.02em}
.chat-topbar-sub{font-size:12px;color:var(--text-sub);margin-top:2px}
.chat-messages-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;background:var(--bg0)}
.chat-msg{display:flex;flex-direction:column;max-width:72%;animation:msgIn 0.18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-msg-bubble{padding:9px 13px;border-radius:14px;background:var(--bg2);border:1px solid var(--border);position:relative;word-break:break-word;line-height:1.5}
.chat-msg-sender{font-size:11px;font-weight:800;margin-bottom:4px;padding:0 2px}
.chat-msg-text{font-size:13.5px;color:var(--text)}
.chat-msg-time{font-size:10px;color:var(--text-dim);margin-top:5px;text-align:right;padding-right:2px}
.chat-highlight{background:rgba(255,214,0,0.28);color:#ffe766;border-radius:3px;padding:0 2px;font-weight:700}
.chat-empty{text-align:center;padding:60px 20px;color:var(--text-sub)}
.chat-empty-icon{font-size:40px;margin-bottom:12px}
.chat-counter-bar{padding:8px 20px;background:var(--bg1);border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--text-sub);flex-shrink:0}

/* ═══════════════════════════════════════════
   NEW: BOM System Styles
═══════════════════════════════════════════ */
.bom-tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:14px}
.bom-tab{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-sub);cursor:pointer;font-size:13px;font-weight:700;transition:all 0.15s}
.bom-tab:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.bom-tab.active{background:var(--accent-dim);border-color:rgba(37,211,102,0.35);color:var(--accent)}

/* BOM Setup */
.bom-setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.bom-panel{background:var(--bg1);border:1px solid var(--border);border-radius:16px;padding:20px}
.bom-panel-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px}
.bom-panel-sub{font-size:12px;color:var(--text-sub);margin-bottom:16px}
.bom-year-select{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;cursor:pointer;appearance:none;font-weight:700}
.bom-year-select:focus{border-color:var(--accent)}
.bom-user-list{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-top:12px}
.bom-user-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;user-select:none}
.bom-user-item:hover{border-color:var(--border-hover)}
.bom-user-item.selected{border-color:rgba(37,211,102,0.5);background:var(--accent-dim)}
.bom-user-item.disabled{opacity:0.4;cursor:not-allowed}
.bom-checkbox{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s;font-size:10px}
.bom-user-item.selected .bom-checkbox{background:var(--accent);border-color:var(--accent);color:#000}
.bom-user-name{flex:1;font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bom-user-count{font-size:11px;color:var(--text-sub)}
.bom-batch-list{display:flex;flex-direction:column;gap:10px;margin-top:0}
.bom-batch-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.bom-batch-year{font-size:20px;font-weight:900;color:var(--accent);min-width:48px}
.bom-batch-members{flex:1;display:flex;flex-wrap:wrap;gap:6px}
.bom-member-tag{padding:3px 10px;background:var(--bg3);border-radius:12px;font-size:11px;font-weight:700;color:var(--text-sub)}
.bom-batch-delete{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-dim);cursor:pointer;font-size:12px;transition:all 0.15s}
.bom-batch-delete:hover{border-color:var(--red);color:var(--red)}
.bom-add-btn{width:100%;padding:10px;background:var(--accent-dim);border:1px solid rgba(37,211,102,0.3);border-radius:10px;color:var(--accent);font-weight:700;font-size:13px;cursor:pointer;margin-top:14px;transition:all 0.15s}
.bom-add-btn:hover{background:var(--accent-mid)}
.bom-add-btn:disabled{opacity:0.4;cursor:not-allowed}
.bom-alert{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-top:10px;display:none}
.bom-alert.show{display:block}
.bom-alert.error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
.bom-alert.success{background:var(--accent-dim);border:1px solid rgba(37,211,102,0.3);color:var(--accent)}

/* BOM Leaderboard */
.bom-lb-card{background:var(--bg1);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
.bom-lb-header-row{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg2)}
.bom-lb-header-row span{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em}
.bom-lb-row{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);transition:background 0.12s}
.bom-lb-row:last-child{border-bottom:none}
.bom-lb-row:hover{background:var(--bg2)}
.bom-lb-rank-cell{font-size:20px;text-align:center}
.bom-lb-info{min-width:0}
.bom-lb-year{font-size:17px;font-weight:900;color:var(--text);margin-bottom:4px}
.bom-lb-members{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.bom-lb-member-tag{padding:2px 8px;background:var(--bg3);border-radius:10px;font-size:11px;font-weight:700;color:var(--text-sub)}
.bom-lb-bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;max-width:300px}
.bom-lb-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#00e5ff);transition:width 0.6s cubic-bezier(0.23,1,0.32,1)}
.bom-score-cell{text-align:right;flex-shrink:0}
.bom-score-num{font-size:22px;font-weight:900;color:var(--text)}
.bom-score-bonus{font-size:11px;color:var(--accent);margin-top:2px}
.bom-score-days{font-size:11px;color:var(--text-sub);margin-top:1px}
.bom-empty{text-align:center;padding:60px 20px;color:var(--text-sub)}
.bom-empty-icon{font-size:48px;margin-bottom:12px}
.bom-compute-btn{padding:11px 24px;background:linear-gradient(135deg,#25D366,#00b4d8);border:none;border-radius:10px;color:#000;font-weight:800;font-size:14px;cursor:pointer;transition:all 0.15s;margin-top:4px}
.bom-compute-btn:hover{opacity:0.9;transform:translateY(-1px)}

/* BOM Daily Leaderboard */
.bom-daily-grid{display:flex;flex-direction:column;gap:8px}
.bom-daily-row{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--bg1);border:1px solid var(--border);border-radius:11px}
.bom-daily-date{font-size:12px;font-weight:700;color:var(--text-sub);min-width:80px}
.bom-daily-winner{font-size:13px;font-weight:800;color:var(--accent)}
.bom-daily-score{margin-left:auto;font-size:13px;font-weight:700;color:var(--text);background:var(--bg2);padding:3px 10px;border-radius:8px}

/* BOM Squad badge */
.bom-squad-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:linear-gradient(135deg,rgba(255,107,53,0.15),rgba(247,197,159,0.15));border:1px solid rgba(255,107,53,0.35);border-radius:20px;font-size:12px;font-weight:800;color:#ffa07a;margin-top:8px}
.bom-rules-card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:20px}
.bom-rule-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.bom-rule-item:last-child{border-bottom:none}
.bom-rule-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.bom-rule-text{font-size:13px;color:var(--text-sub);line-height:1.5}

/* Mobile Hamburger */
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:100;width:38px;height:38px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:90}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:95;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-content{padding-top:60px}
  .hamburger{display:flex}
  .mobile-overlay.open{display:block}
  .page{padding:20px 16px}
  .two-col{grid-template-columns:1fr}

<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const state = {
  analytics: null,
  view: 'upload',   // upload | overview | leaderboard | user | chat | bom
  selectedUser: null,
  search: '',
  // NEW: Chat Preview
  chatFilter: null,          // word being previewed
  chatFilterUser: null,      // user whose word was clicked
  // NEW: BOM System
  bom: {
    batches: {},             // { "2006": ["User1","User2","User3"] }
    scores: null,            // computed after "Calculate"
    subView: 'setup',        // 'setup' | 'leaderboard' | 'daily'
    setupYear: '2006',       // currently selected year in setup
    setupSelected: [],       // currently selected users for this year
  },
};

// UPDATED: Performance Optimization – global message stores
window.allMessages      = [];
window.validBOMMessages = []; // precomputed for BOM

// BOM filter (also used to precompute validBOMMessages)
const BOM_BAD_MAIN = /^(good\s*morning|good\s*night|gm\b|gn\b|goodnight|goodmorning|good\s*eve|jai\s*shri|jai\s*hind|happy\s*\w+|congrat|\bhi\b|\bhey\b|\bhello\b|\bokay\b|\bok\b|\byes\b|\bno\b|\bhmm\b|\bhaha\b|\blol\b|🙏+|👍+)/i;

function isBOMValidMessage(msg) {
  if (msg.hour < 6 || msg.hour >= 22) return false;
  if (msg.content.length <= 3) return false;
  if (BOM_BAD_MAIN.test(msg.content.trim())) return false;
  if (SYSTEM_PATS.some(p => p.test(msg.content))) return false;
  if (msg.date.getMonth() < 3) return false; // UPDATED: April Rule – April 1 onward
  return true;
}

// ═══════════════════════════════════════════════════
//  PARSING CONSTANTS
// ═══════════════════════════════════════════════════
const SYSTEM_PATS = [
  /end-to-end encrypted/i, /changed the subject/i, /changed this group/i,
  /changed the group/i, /added you/i, /added \+/i, /\bleft\b/i,
  /removed you/i, /created group/i, /changed their phone/i, /group icon/i,
  /joined using this group/i, /invite link/i, /<media omitted>/i,
  /media omitted/i, /this message was deleted/i, /you deleted this message/i,
  /security code/i, /missed.*call/i, /pinned a message/i, /null$/,
  /you were added/i, /was added/i, /messages to this group/i,
];

const STOP_WORDS = new Set([
  'that','with','this','from','have','they','will','your','what','when','were',
  'there','been','their','more','also','into','some','than','then','these','about',
  'would','which','after','first','time','very','even','most','only','over','such',
  'just','know','like','come','good','year','back','make','much','them','well',
  'said','each','does','before','could','other','people','dont','okay','yeah',
  'hello','https','http','omitted','media','null','haan','nahi','kuch','tere','mere',
  'iska','wala','karo','bhai','yaar','acha','abhi','raha','liya','gaya','aise','phir',
]);

// Two WhatsApp message regex patterns
const MSG_RES = [
  // iOS: [DD/MM/YYYY, HH:MM:SS] Name: msg
  /^\[(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}),\s*(\d{1,2}:\d{2}(?::\d{2})?\s*(?:AM|PM)?)\]\s*([^:]+):\s*([\s\S]*)/i,
  // Android: DD/MM/YYYY, HH:MM - Name: msg
  /^(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}),\s*(\d{1,2}:\d{2}(?::\d{2})?\s*(?:AM|PM)?)\s*[-–]\s*([^:]+):\s*([\s\S]*)/i,
];

// ═══════════════════════════════════════════════════
//  PARSERS
// ═══════════════════════════════════════════════════
function parseHour(t) {
  const m = t.match(/(\d{1,2}):(\d{2}).*?(AM|PM)?/i);
  if (!m) return 0;
  let h = parseInt(m[1]);
  const mer = (m[3] || '').toUpperCase();
  if (mer === 'PM' && h !== 12) h += 12;
  if (mer === 'AM' && h === 12) h = 0;
  return Math.min(23, h);
}

function parseDate(ds) {
  const p = ds.trim().split(/[\/\-\.]/);
  if (p.length !== 3) return null;
  let [a, b, c] = p.map(Number);
  if (c < 100) c += 2000;
  // DD/MM/YYYY (most common for WhatsApp)
  if (a <= 31 && b <= 12) return new Date(c, b - 1, a);
  // MM/DD/YYYY
  if (b <= 31 && a <= 12) return new Date(c, a - 1, b);
  return null;
}

function parseTime(d, ts) {
  const m = ts.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?/i);
  if (!m) return '';
  let h = parseInt(m[1]);
  const min = m[2];
  const mer = (m[4] || '').toUpperCase();
  if (mer === 'PM' && h !== 12) h += 12;
  if (mer === 'AM' && h === 12) h = 0;
  return `${String(h).padStart(2,'0')}:${min}`;
}

function toDS(d) { return d.toISOString().slice(0, 10); }

function parseChat(text) {
  const lines = text.split('\n');
  const msgs = [];
  let cur = null;
  let curTS = '';

  for (const line of lines) {
    let hit = false;
    for (const re of MSG_RES) {
      const m = line.match(re);
      if (m) {
        if (cur) msgs.push(cur);
        const [, ds, ts, sender, content] = m;
        const date = parseDate(ds);
        const c = content.trim();
        if (!date || SYSTEM_PATS.some(p => p.test(c))) {
          cur = null;
        } else {
          cur = {
            sender: sender.trim(),
            date,
            dateStr: toDS(date),
            hour: parseHour(ts),
            timeStr: parseTime(date, ts),
            content: c,
          };
          curTS = ts;
        }
        hit = true;
        break;
      }
    }
    if (!hit && cur && line.trim()) cur.content += ' ' + line.trim();
  }
  if (cur) msgs.push(cur);
  return msgs;
}

// ═══════════════════════════════════════════════════
//  ANALYTICS
// ═══════════════════════════════════════════════════
function computeAnalytics(msgs) {
  const uMap = {};
  const dMap = {};
  const hArr = Array(24).fill(0);

  for (const msg of msgs) {
    const s = msg.sender;
    if (!uMap[s]) {
      uMap[s] = {
        name: s, count: 0, hours: Array(24).fill(0),
        daily: {}, words: {}, first: msg.date, last: msg.date, totalWords: 0,
      };
    }
    const u = uMap[s];
    u.count++;
    u.hours[msg.hour]++;
    u.daily[msg.dateStr] = (u.daily[msg.dateStr] || 0) + 1;
    if (msg.date < u.first) u.first = msg.date;
    if (msg.date > u.last) u.last = msg.date;
    const wds = msg.content.split(/\s+/).filter(w => w.length > 1);
    u.totalWords += wds.length;
    for (const w of wds) {
      const cl = w.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (cl.length > 3 && !STOP_WORDS.has(cl)) u.words[cl] = (u.words[cl] || 0) + 1;
    }
    dMap[msg.dateStr] = (dMap[msg.dateStr] || 0) + 1;
    hArr[msg.hour]++;
  }

  const users = Object.values(uMap).sort((a, b) => b.count - a.count);
  const allDates = Object.keys(dMap).sort();
  const dailyData = allDates.map(d => ({ date: d, count: dMap[d] }));

  // Weekly aggregation
  const wkMap = {};
  for (const { date, count } of dailyData) {
    const d = new Date(date);
    const ws = new Date(d);
    ws.setDate(d.getDate() - d.getDay());
    const k = toDS(ws);
    wkMap[k] = (wkMap[k] || 0) + count;
  }
  const weeklyData = Object.entries(wkMap).sort().map(([d, c]) => ({ date: d, count: c }));

  const span = allDates.length > 1
    ? Math.max(1, (new Date(allDates.at(-1)) - new Date(allDates[0])) / 864e5 + 1)
    : 1;

  return {
    total: msgs.length,
    users,
    dailyData,
    weeklyData,
    hourData: hArr,
    dateRange: { start: allDates[0], end: allDates.at(-1) },
    avgPerDay: (msgs.length / span).toFixed(1),
    span: Math.round(span),
  };
}

// ═══════════════════════════════════════════════════
//  CHART REGISTRY
// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
const FMT_D = { day: 'numeric', month: 'short', year: 'numeric' };
const FMT_S = { day: 'numeric', month: 'short' };
function fmtDate(d) {
  if (!d) return '—';
  return (d instanceof Date ? d : new Date(d)).toLocaleDateString('en-GB', FMT_D);
}
function fmtShort(ds) { return new Date(ds).toLocaleDateString('en-GB', FMT_S); }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const AV_COLORS = ['#25D366','#00b4d8','#ef476f','#ffd166','#a78bfa','#06d6a0','#ff9f1c','#4cc9f0'];
function avatar(name, size = 38) {
  const initials = name.split(/\s+/).map(p => p[0]).join('').slice(0, 2).toUpperCase() || '??';
  const c = AV_COLORS[name.charCodeAt(0) % AV_COLORS.length];
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${c}22;border:2px solid ${c}55;font-size:${Math.round(size / 2.8)}px;color:${c}">${esc(initials)}</div>`;
}

function avatarColor(name) {
  return AV_COLORS[name.charCodeAt(0) % AV_COLORS.length];
}

const MEDAL = ['🥇', '🥈', '🥉'];
const MEDAL_C = ['var(--gold)', 'var(--silver)', 'var(--bronze)'];

}

function attachUploadListeners() {
  const dz = document.getElementById('drop-zone');
  const fi = document.getElementById('file-input');

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
  });
  fi.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });
}

async function processFile(file) {
  const prog = document.getElementById('upload-progress');
  const err = document.getElementById('upload-error');
  err.textContent = '';

  const setProgress = msg => { if (prog) prog.textContent = msg; };

  try {
    let text = '';
    if (file.name.toLowerCase().endsWith('.zip')) {
      setProgress('⏳ Extracting ZIP archive…');
      if (typeof JSZip === 'undefined') throw new Error('JSZip library not loaded');
      const zip = await JSZip.loadAsync(file);
      const txtFile = Object.values(zip.files).find(f => !f.dir && f.name.toLowerCase().endsWith('.txt'));
      if (!txtFile) throw new Error('No .txt file found inside the ZIP archive');
      text = await txtFile.async('string');
    } else {
      setProgress('⏳ Reading file…');
      text = await file.text();
    }

    setProgress('🔍 Parsing messages…');
    await tick();

    const msgs = parseChat(text);
    if (msgs.length < 3) throw new Error(`Only ${msgs.length} messages parsed. Make sure this is a WhatsApp group export (.txt format).`);

    setProgress(`📊 Analysing ${msgs.length.toLocaleString()} messages…`);
    await tick();

    // UPDATED: Performance Optimization – store globally + precompute BOM filter
    window.allMessages      = msgs;
    window.validBOMMessages = msgs.filter(isBOMValidMessage);

    // UPDATED: Data Sharing – save to localStorage for bom.html
    try {
      const payload = msgs.map(m => ({
        sender: m.sender, dateStr: m.dateStr, timeStr: m.timeStr,
        hour: m.hour, content: m.content, ts: m.date.getTime(),
      }));
      localStorage.setItem('wa_data', JSON.stringify(payload));
      localStorage.setItem('wa_saved_at', Date.now());
    } catch(e) { console.warn('localStorage save failed:', e.message); }

    state.analytics = computeAnalytics(msgs);
    state.view = 'overview';
    render();
  } catch (e) {
    setProgress('');
    if (err) err.textContent = '❌ ' + e.message;
  }
}

function tick() { return new Promise(r => setTimeout(r, 20)); }

function buildLBList() {
  const { analytics, search } = state;
  const max = analytics.users[0]?.count || 1;
  const list = analytics.users.filter(u => !search || u.name.toLowerCase().includes(search.toLowerCase()));
  if (!list.length) return `<div style="padding:48px;text-align:center;color:var(--text-sub)">No members found matching "${esc(search)}"</div>`;

  return list.map(u => {
    const ri = analytics.users.indexOf(u);
    const pct = (u.count / max * 100).toFixed(1);
    const share = ((u.count / analytics.total) * 100).toFixed(1);
    const topHour = u.hours.indexOf(Math.max(...u.hours));
    const rankLabel = ri < 3 ? MEDAL[ri] : `<span style="font-size:13px">#${ri+1}</span>`;
    return `
    <div class="lb-item" data-user="${esc(u.name)}">
      <div class="lb-rank" style="font-size:${ri<3?'22':'13'}px">${rankLabel}</div>

        <div class="lb-count-sub">peak ${topHour}:00</div>
      </div>
    </div>`;
  }).join('');
}

function renderChat() {
  const word = state.chatFilter;
  const filterUser = state.chatFilterUser;
  const msgs = window.allMessages || [];

  if (!word) {
    return `<div class="page"><div style="padding:48px;text-align:center;color:var(--text-sub)">No word selected.</div></div>`;

  return `

// BOM bad patterns to filter
const BOM_BAD = /^(good\s*morning|good\s*night|gm\b|gn\b|goodnight|goodmorning|good\s*eve|jai\s*shri|jai\s*hind|happy\s*\w+|congrat|\bhi\b|\bhey\b|\bhello\b|\bokay\b|\bok\b|\byes\b|\bno\b|\bhmm\b|\bhaha\b|\blol\b|🙏+|👍+)/i;

function isBOMValidMessage(msg) {
  // Time window: 6AM to 10PM (hour 6–21)
  if (msg.hour < 6 || msg.hour >= 22) return false;
  // Meaningful length
  if (msg.content.length <= 3) return false;
  // Not a greeting/spam
  if (BOM_BAD.test(msg.content.trim())) return false;
  // Not a system message (already filtered in parse, but double-check)
  if (SYSTEM_PATS.some(p => p.test(msg.content))) return false;
  return true;
}

function computeBOMScores() {
  const msgs = window.allMessages || [];
  const { batches } = state.bom;
  const scores = {};

  for (const [year, members] of Object.entries(batches)) {
    if (year === '2025') continue; // BOM Squad – judges only, excluded

    const batchMsgs = msgs.filter(m => members.includes(m.sender) && isBOMValidMessage(m));

    const dailyMap = {};
    for (const m of batchMsgs) {
      dailyMap[m.dateStr] = (dailyMap[m.dateStr] || 0) + 1;
    }

    const activeDays = Object.keys(dailyMap).length;
    let bonus = 0;
    if (activeDays >= 20) bonus += 50;
    else if (activeDays >= 10) bonus += 20;

    scores[year] = {
      year,
      members,
      rawTotal: batchMsgs.length,
      bonus,
      total: batchMsgs.length + bonus,
      activeDays,
      dailyMap,
    };
  }

  return scores;
}

function renderBOMDaily() {
  const { scores } = state.bom;

  if (!scores) {
    return `<div class="bom-empty">
      <div class="bom-empty-icon">📅</div>
      <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px">Calculate Scores First</div>
      <div style="font-size:13px;margin-bottom:20px">Go to Setup and click "Calculate BOM Scores".</div>
      <button class="bom-compute-btn" id="bom-compute-btn-daily">🔥 Calculate Now</button>
    </div>`;
  }

  // Build a daily winner map across all batches
  const allDates = new Set();
  for (const s of Object.values(scores)) {
    Object.keys(s.dailyMap).forEach(d => allDates.add(d));
  }
  const sortedDates = [...allDates].sort().reverse(); // Most recent first

  if (sortedDates.length === 0) {
    return `<div class="bom-empty"><div class="bom-empty-icon">📭</div><div>No daily data available.</div></div>`;
  }

  const rows = sortedDates.slice(0, 60).map(date => {
    let winner = null;
    let winnerScore = 0;
    for (const s of Object.values(scores)) {
      const dc = s.dailyMap[date] || 0;
      if (dc > winnerScore) { winnerScore = dc; winner = s.year; }
    }
    if (!winner || winnerScore === 0) return '';
    const all = Object.values(scores)
      .filter(s => s.dailyMap[date])
      .sort((a,b) => b.dailyMap[date] - a.dailyMap[date]);

    return `
    <div class="bom-daily-row">
      <div class="bom-daily-date">${fmtShort(date)}</div>
      <div style="flex:1;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
        ${all.map((s, i) => `
        <div style="display:flex;align-items:center;gap:5px">
          <span style="font-size:12px">${i === 0 ? '👑' : ''}</span>
          <span style="font-size:12px;font-weight:800;color:${i===0?'var(--accent)':'var(--text-sub)'}">Batch ${s.year}</span>
          <span class="bom-daily-score">${s.dailyMap[date]}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).filter(Boolean).join('');

  return `
<div style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
  <div>
    <div style="font-size:15px;font-weight:800;color:var(--text)">Daily Leaderboard</div>
    <div style="font-size:12px;color:var(--text-sub);margin-top:2px">Most active batch per day · Recent 60 days</div>
  </div>
</div>
<div class="bom-daily-grid">${rows || '<div class="bom-empty"><div class="bom-empty-icon">📭</div><div>No data</div></div>'}</div>`;
}

function attachBOMUserListeners() {
  document.querySelectorAll('[data-bom-user]').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.bomUser;
      if (el.classList.contains('disabled')) return;
      const sel = state.bom.setupSelected;
      const idx = sel.indexOf(name);
      if (idx >= 0) {
        sel.splice(idx, 1);
      } else {
        if (sel.length >= 3) return;
        sel.push(name);
      }
      reRenderBOMSetupPanels();
    });
  });
}

function saveBOMBatch() {
  const { setupYear, setupSelected, batches } = state.bom;
  if (setupSelected.length !== 3) {
    showBOMAlert('Please select exactly 3 members.', 'error');
    return;
  }
  batches[setupYear] = [...setupSelected];
  state.bom.setupSelected = [];
  state.bom.scores = null;
  showBOMAlert(`Batch ${setupYear} saved! 🎉`, 'success');
  reRenderBOMSetupPanels();
}

function calculateBOM() {
  state.bom.scores = computeBOMScores();
  state.bom.subView = 'leaderboard';
  reRenderBOM();
}

function showBOMAlert(msg, type) {
  const el = document.getElementById('bom-alert');
  if (!el) return;
  el.textContent = msg;
  el.className = `bom-alert show ${type}`;
  setTimeout(() => { el.classList.remove('show'); }, 3000);
}

function reRenderBOM() {
  const el = document.getElementById('bom-content');
  if (!el) return;
  // Rebuild full BOM tab area
  const tabs = [
    { id: 'setup',       label: '⚙️ Setup Batches' },
    { id: 'leaderboard', label: '🏆 BOM Leaderboard' },
    { id: 'daily',       label: '📅 Daily Leaders' },
  ];
  document.querySelectorAll('[data-bom-tab]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.bomTab === state.bom.subView);
  });
  let content = '';
  if (state.bom.subView === 'setup')       content = renderBOMSetup();
  else if (state.bom.subView === 'leaderboard') content = renderBOMLeaderboard();
  else if (state.bom.subView === 'daily')  content = renderBOMDaily();
  el.innerHTML = content;
  attachBOMListeners();
}

function reRenderBOMSetupPanels() {
  const el = document.getElementById('bom-content');
  if (!el) return;
  el.innerHTML = renderBOMSetup();
  attachBOMListeners();
}

// ═══════════════════════════════════════════════════
//  CHART RENDERING
// ═══════════════════════════════════════════════════
const CHART_GRID = 'rgba(30,58,95,0.5)';
const CHART_TICK = '#6b90aa';
const TICK_FONT = { size: 11 };

function chartDefaults() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color: CHART_GRID }, ticks: { color: CHART_TICK, font: TICK_FONT } },
      y: { grid: { color: CHART_GRID }, ticks: { color: CHART_TICK, font: TICK_FONT } },
    },
  };
}

function renderCharts() {
  if (state.view === 'overview')    renderOverviewCharts();
  else if (state.view === 'user')   renderUserCharts();
  // NEW: chat and bom views don't need Chart.js charts
  else if (state.view === 'chat')   scrollChatToBottom();
}

function renderOverviewCharts() {
  const { analytics } = state;

  // Choose daily vs weekly based on date range
  const useWeekly = analytics.dailyData.length > 90;
  const data = useWeekly ? analytics.weeklyData : analytics.dailyData;
  const subEl = document.getElementById('time-chart-sub');
  if (subEl) subEl.textContent = useWeekly ? 'Weekly aggregated activity' : 'Daily message count';

  const labels = data.map(d => fmtShort(d.date));
  const counts = data.map(d => d.count);

  mkChart('daily-chart', {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: counts,
        borderColor: '#25D366',
        backgroundColor: 'rgba(37,211,102,0.07)',
        fill: true,
        tension: 0.4,
        pointRadius: data.length > 60 ? 0 : 3,
        pointHoverRadius: 5,
        borderWidth: 2.5,
      }],
    },
    options: {
      ...chartDefaults(),
      scales: {
        x: { grid: { color: CHART_GRID }, ticks: { color: CHART_TICK, font: TICK_FONT, maxTicksLimit: 9, autoSkip: true } },
        y: { grid: { color: CHART_GRID }, ticks: { color: CHART_TICK, font: TICK_FONT } },
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: i => `${i.raw.toLocaleString()} messages` } },
      },
    },
  });

  // Hourly chart — colour intensity by value
  const maxH = Math.max(...analytics.hourData);
  mkChart('hourly-chart', {
    type: 'bar',
    data: {
      labels: analytics.hourData.map((_, i) => `${i}:00`),
      datasets: [{
        data: analytics.hourData,
        backgroundColor: analytics.hourData.map(v => `rgba(37,211,102,${0.25 + (v / maxH) * 0.7})`),
        borderRadius: 4,
      }],
    },
    options: {
      ...chartDefaults(),
      scales: {
        x: { grid: { display: false }, ticks: { color: CHART_TICK, font: { size: 10 }, maxTicksLimit: 13, autoSkip: true } },
        y: { grid: { color: CHART_GRID }, ticks: { color: CHART_TICK, font: TICK_FONT } },
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: i => `${i.raw.toLocaleString()} messages` } },
      },
    },
  });
}

function renderUserCharts() {
  const { analytics, selectedUser } = state;
  const u = analytics.users.find(u => u.name === selectedUser);
  if (!u) return;

  const daily = Object.entries(u.daily).sort(([a],[b]) => a.localeCompare(b));
  const dlabels = daily.map(([d]) => fmtShort(d));
  const dcounts = daily.map(([,c]) => c);

  mkChart('user-daily-chart', {
    type: 'line',
    data: {
      labels: dlabels,
      datasets: [{
        data: dcounts,
        borderColor: '#25D366',
        backgroundColor: 'rgba(37,211,102,0.07)',
        fill: true,
        tension: 0.4,
        pointRadius: daily.length > 60 ? 0 : 3,
        pointHoverRadius: 5,
        borderWidth: 2.5,
      }],
    },
    options: {
      ...chartDefaults(),
      scales: {
        x: { grid: { color: CHART_GRID }, ticks: { color: CHART_TICK, font: TICK_FONT, maxTicksLimit: 8 } },
        y: { grid: { color: CHART_GRID }, ticks: { color: CHART_TICK, font: TICK_FONT } },
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: i => `${i.raw} messages` } },
      },
    },
  });

  const maxUH = Math.max(...u.hours, 1);
  mkChart('user-hourly-chart', {
    type: 'bar',
    data: {
      labels: u.hours.map((_, i) => i % 3 === 0 ? `${i}h` : ''),
      datasets: [{
        data: u.hours,
        backgroundColor: u.hours.map(v => `rgba(37,211,102,${0.2 + (v / maxUH) * 0.75})`),
        borderRadius: 3,
      }],
    },
    options: {
      ...chartDefaults(),
      scales: {
        x: { grid: { display: false }, ticks: { color: CHART_TICK, font: { size: 10 } } },
        y: { grid: { color: CHART_GRID }, ticks: { color: CHART_TICK, font: { size: 10 } } },
      },
      plugins: { legend: { display: false } },
    },
  });
}

// ═══════════════════════════════════════════════════
//  CSV EXPORT
// ═══════════════════════════════════════════════════
function exportCSV() {
  const a = state.analytics;
  const header = ['Rank','Name','Messages','% Share','Avg/Day','Peak Hour','Total Words','First Message','Last Message'];
  const rows = a.users.map((u, i) => {
    const topH = u.hours.indexOf(Math.max(...u.hours));
    const days = Math.max(1, (u.last - u.first) / 864e5 + 1);
    return [
      i + 1,
      `"${u.name.replace(/"/g, '""')}"`,
      u.count,
      ((u.count / a.total) * 100).toFixed(2) + '%',
      (u.count / days).toFixed(1),
      topH + ':00',
      u.totalWords,
      fmtDate(u.first),
      fmtDate(u.last),
    ];
  });
  const csv = [header, ...rows].map(r => r.join(',')).join('\n');
  const link = document.createElement('a');
  link.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  link.download = 'whatsapp_group_analytics.csv';
  link.click();
}

render();
